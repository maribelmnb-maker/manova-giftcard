[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SENDGRID_FROM_EMAIL"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "MP_ACCESS_TOKEN,SENDGRID_API_KEY"
